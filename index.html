<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2dgames</title>
<style>
  @font-face{
    font-family:'PixelTitle';
    src:local('Press Start 2P');
  }
  :root{
    --blue:#2b6bff;
    --blue-dark:#1c4fd6;
    --ink:#12141a;
    --ink-dim:#6b7280;
    --line:#e7e9ee;
    --paper:#ffffff;
    --grid:#f3f5f8;
    --green:#1fa15a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Segoe UI',-apple-system,'Malgun Gothic','맑은 고딕',sans-serif;
    min-height:100vh;
  }

  header{
    padding:28px 24px 20px;
    border-bottom:2px solid var(--ink);
    position:relative;
    overflow:hidden;
  }
  header::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:16px 16px;
    mask-image:linear-gradient(to bottom, black, transparent 85%);
    pointer-events:none;
  }
  .headerInner{max-width:1080px;margin:0 auto;position:relative;}
  .headTop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:7px;
    font-family:'PixelTitle', ui-monospace, 'Courier New', monospace;
    font-size:10px;letter-spacing:2px;color:var(--blue);
    background:#eef3ff;border:1px solid #d6e2ff;border-radius:20px;
    padding:6px 12px;margin-bottom:16px;
  }
  .eyebrow .dot{width:6px;height:6px;background:var(--blue);animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  h1{
    font-family:'PixelTitle', ui-monospace, 'Courier New', monospace;
    font-size:clamp(28px,5vw,44px);
    letter-spacing:1px;
    margin:0 0 6px;
    line-height:1.3;
  }
  h1 span{color:var(--blue);}
  .sub{color:var(--ink-dim);font-size:14px;margin:0 0 24px;}

  .searchRow{position:relative;max-width:420px;margin-bottom:16px;}
  .searchRow svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-dim);}
  #searchInput{
    width:100%;padding:12px 16px 12px 40px;
    border:2px solid var(--ink);border-radius:10px;
    font-size:14px;color:var(--ink);background:var(--paper);
    outline:none;
  }
  #searchInput:focus{border-color:var(--blue);box-shadow:0 0 0 3px #dbe6ff;}
  #searchInput::placeholder{color:#9aa1ad;}

  .catRow{display:flex;flex-wrap:wrap;gap:8px;}
  .catChip{
    font-size:12px;font-weight:700;letter-spacing:0.2px;
    padding:7px 13px;border-radius:20px;border:2px solid var(--ink);
    background:var(--paper);color:var(--ink);cursor:pointer;white-space:nowrap;
  }
  .catChip.active{background:var(--blue);border-color:var(--blue);color:#fff;}

  main{max-width:1080px;margin:0 auto;padding:28px 24px 80px;}
  .countRow{font-size:12px;color:var(--ink-dim);margin-bottom:16px;letter-spacing:0.3px;}
  #countNum{color:var(--ink);font-weight:700;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:22px;
  }
  .gameCard{
    border:2px solid var(--ink);
    border-radius:14px;
    overflow:hidden;
    background:var(--paper);
    display:flex;flex-direction:column;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .gameCard:hover{transform:translateY(-4px);box-shadow:6px 6px 0 var(--ink);}

  .thumb{
    aspect-ratio:4/3;
    background:#eaf7ee;
    display:flex;align-items:center;justify-content:center;
    border-bottom:2px solid var(--ink);
    position:relative;
    overflow:hidden;
  }
  .thumb svg{width:72%;height:72%;image-rendering:pixelated;}
  .thumb img{width:100%;height:100%;object-fit:cover;}

  .cardBody{padding:14px 16px 16px;display:flex;flex-direction:column;gap:4px;flex:1;}
  .gameTitle{font-weight:800;font-size:15px;}
  .gameTag{font-size:11px;color:var(--ink-dim);letter-spacing:0.3px;}

  .playBtn{
    margin-top:12px;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--blue);color:#fff;text-decoration:none;
    font-weight:800;font-size:13px;letter-spacing:0.3px;
    padding:10px 14px;border-radius:8px;border:2px solid var(--ink);
  }
  .playBtn:hover{background:var(--blue-dark);}
  .playBtn:active{transform:translateY(1px);}

  .linkRow{display:flex;gap:8px;margin-top:8px;}
  .linkBtn{
    flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;
    background:var(--paper);color:var(--ink);text-decoration:none;
    font-weight:700;font-size:12px;letter-spacing:0.2px;
    padding:8px 10px;border-radius:8px;border:2px solid var(--ink);
  }
  .linkBtn:hover{background:var(--grid);}

  .emptyState{
    text-align:center;color:var(--ink-dim);font-size:13px;
    padding:60px 20px;display:none;
  }

  footer{
    border-top:2px solid var(--ink);
    padding:18px 24px;text-align:center;
    color:var(--ink-dim);font-size:11px;
    font-family:ui-monospace,'Courier New',monospace;
    letter-spacing:0.5px;
  }

</style>
</head>
<body>

<header>
  <div class="headerInner">
    <div class="headTop">
      <div>
        <div class="eyebrow"><span class="dot"></span> ARCADE ONLINE</div>
        <h1>2d<span>games</span></h1>
        <p class="sub">브라우저에서 바로 즐기는 2D 게임 모음</p>
      </div>
    </div>

    <div class="searchRow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="게임 이름으로 검색...">
    </div>
    <div class="catRow" id="catRow"></div>
  </div>
</header>

<main>
  <div class="countRow"><span id="countNum">2</span>개의 게임</div>
  <div class="grid" id="grid"></div>
  <div class="emptyState" id="emptyState">검색 결과가 없어요. 다른 조건으로 찾아보세요.</div>
</main>

<footer>2DGAMES — PRESS PLAY TO START</footer>

<script>
"use strict";

const CATEGORIES = ['음악','총게임','서바이벌','만들기','퍼즐','모험게임','3D게임','기타'];

const BUILTIN_GAMES = [
  {
    id:'builtin-eating-snakes',
    name:'Eating Snakes',
    category:'서바이벌',
    url:'https://kangbaek-ho.github.io/eatingsnakes/',
    homeUrl:'https://kangbaek-ho.github.io/snakeshome/',
    faqUrl:'https://kangbaek-ho.github.io/faq/',
    builtin:true,
    published:true,
    tag:'멀티플레이어 · 아케이드'
  },
  {
    id:'builtin-chess',
    name:'chess',
    category:'퍼즐',
    url:'https://kangbaek-ho.github.io/chess/',
    builtin:true,
    published:true,
    tag:'보드게임 · 1인용'
  },
  {
    id:'builtin-build-a-house-3d',
    name:'build a house 3D',
    category:'만들기',
    url:'https://kangbaek-ho.github.io/build-a-house-3d/',
    builtin:true,
    published:true,
    tag:'건축 · 만들기'
  },
  {
    id:'builtin-wargame',
    name:'The Bridge War',
    category:'총게임',
    url:'https://kangbaek-ho.github.io/wargame/',
    builtin:true,
    published:true,
    tag:'슈팅 · 전투'
  },
  {
    id:'builtin-keyboard',
    name:'키보드',
    category:'기타',
    url:'https://kangbaek-ho.github.io/keyboard/',
    builtin:true,
    published:true,
    tag:'유틸리티 · 재미'
  },
  {
    id:'builtin-wargame-3d',
    name:'The Bridge War',
    category:'3D게임',
    url:'https://kangbaek-ho.github.io/wargame/',
    builtin:true,
    published:true,
    tag:'슈팅 · 3D',
    hideInAll:true
  },
  {
    id:'builtin-build-a-house-3d-cat',
    name:'build a house 3D',
    category:'3D게임',
    url:'https://kangbaek-ho.github.io/build-a-house-3d/',
    builtin:true,
    published:true,
    tag:'건축 · 3D',
    hideInAll:true
  }
];

function getAllGames(){ return BUILTIN_GAMES; }

function snakeThumbSVG(){
  return `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect x="0" y="0" width="32" height="32" fill="#eaf7ee"/>
    <rect x="4" y="26" width="2" height="2" fill="#bfe3c9"/>
    <rect x="12" y="6" width="2" height="2" fill="#bfe3c9"/>
    <rect x="24" y="22" width="2" height="2" fill="#bfe3c9"/>
    <rect x="6" y="18" width="4" height="4" fill="#2f9e5a"/>
    <rect x="10" y="18" width="4" height="4" fill="#37b568"/>
    <rect x="14" y="14" width="4" height="4" fill="#2f9e5a"/>
    <rect x="14" y="18" width="4" height="4" fill="#37b568"/>
    <rect x="18" y="14" width="4" height="4" fill="#2f9e5a"/>
    <rect x="20" y="10" width="6" height="6" fill="#37b568"/>
    <rect x="24" y="11" width="2" height="2" fill="#ffffff"/>
    <rect x="8" y="8" width="3" height="3" fill="#ff5d73"/>
    <rect x="20" y="20" width="3" height="3" fill="#ffd166"/>
  </svg>`;
}
function chessThumbSVG(){
  return `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect x="0" y="0" width="32" height="32" fill="#f3f5f8"/>
    <rect x="4" y="4" width="4" height="4" fill="#12141a"/>
    <rect x="12" y="4" width="4" height="4" fill="#12141a"/>
    <rect x="20" y="4" width="4" height="4" fill="#12141a"/>
    <rect x="8" y="8" width="4" height="4" fill="#12141a"/>
    <rect x="16" y="8" width="4" height="4" fill="#12141a"/>
    <rect x="24" y="8" width="4" height="4" fill="#12141a"/>
    <rect x="4" y="12" width="4" height="4" fill="#12141a"/>
    <rect x="12" y="12" width="4" height="4" fill="#12141a"/>
    <rect x="20" y="12" width="4" height="4" fill="#12141a"/>
    <rect x="10" y="18" width="12" height="3" fill="#2b6bff"/>
    <rect x="12" y="21" width="8" height="3" fill="#2b6bff"/>
    <rect x="9" y="24" width="14" height="3" fill="#2b6bff"/>
  </svg>`;
}
function houseThumbSVG(){
  return `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect x="0" y="0" width="32" height="32" fill="#eaf2ff"/>
    <rect x="2" y="24" width="28" height="2" fill="#8aa0ff"/>
    <rect x="6" y="14" width="20" height="12" fill="#f4e4c9"/>
    <rect x="4" y="14" width="24" height="3" fill="#c0392b"/>
    <rect x="14" y="8" width="4" height="6" fill="#c0392b"/>
    <rect x="16" y="4" width="2" height="4" fill="#c0392b"/>
    <rect x="10" y="18" width="5" height="5" fill="#8ec4ff"/>
    <rect x="19" y="18" width="5" height="5" fill="#8ec4ff"/>
    <rect x="14" y="20" width="4" height="6" fill="#8a5a2b"/>
    <rect x="24" y="10" width="2" height="6" fill="#4a4a4a"/>
  </svg>`;
}
function wargameThumbSVG(){
  return `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect x="0" y="0" width="32" height="32" fill="#e9ede6"/>
    <rect x="2" y="24" width="28" height="3" fill="#5a6b4a"/>
    <rect x="6" y="18" width="10" height="4" fill="#4a5a3a"/>
    <rect x="8" y="14" width="6" height="4" fill="#4a5a3a"/>
    <rect x="18" y="8" width="3" height="16" fill="#333"/>
    <rect x="21" y="10" width="8" height="2" fill="#333"/>
    <rect x="16" y="7" width="6" height="3" fill="#3a4a2a"/>
    <rect x="4" y="10" width="4" height="4" fill="#c0392b"/>
    <rect x="6" y="8" width="1" height="3" fill="#c0392b"/>
  </svg>`;
}
function keyboardThumbSVG(){
  return `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect x="0" y="0" width="32" height="32" fill="#f0eefc"/>
    <rect x="3" y="10" width="26" height="14" rx="1" fill="#2b2f3a"/>
    <rect x="5" y="12" width="3" height="3" fill="#eef0f5"/>
    <rect x="9" y="12" width="3" height="3" fill="#eef0f5"/>
    <rect x="13" y="12" width="3" height="3" fill="#eef0f5"/>
    <rect x="17" y="12" width="3" height="3" fill="#eef0f5"/>
    <rect x="21" y="12" width="3" height="3" fill="#eef0f5"/>
    <rect x="25" y="12" width="2" height="3" fill="#eef0f5"/>
    <rect x="5" y="16" width="3" height="3" fill="#2b6bff"/>
    <rect x="9" y="16" width="3" height="3" fill="#eef0f5"/>
    <rect x="13" y="16" width="3" height="3" fill="#eef0f5"/>
    <rect x="17" y="16" width="3" height="3" fill="#eef0f5"/>
    <rect x="21" y="16" width="3" height="3" fill="#eef0f5"/>
    <rect x="7" y="20" width="18" height="3" fill="#eef0f5"/>
  </svg>`;
}
function genericThumbSVG(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#8aa0ff" stroke-width="1.6" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="7" width="20" height="11" rx="4"/>
    <path d="M6.2 12.5h3.6M8 10.7v3.6" stroke="#8aa0ff"/>
    <circle cx="16" cy="11" r="1.1" fill="#8aa0ff" stroke="none"/>
    <circle cx="18.2" cy="13.2" r="1.1" fill="#8aa0ff" stroke="none"/>
  </svg>`;
}
function thumbInnerHTML(game){
  if(game.id==='builtin-eating-snakes') return snakeThumbSVG();
  if(game.id==='builtin-chess') return chessThumbSVG();
  if(game.id==='builtin-build-a-house-3d' || game.id==='builtin-build-a-house-3d-cat') return houseThumbSVG();
  if(game.id==='builtin-wargame' || game.id==='builtin-wargame-3d') return wargameThumbSVG();
  if(game.id==='builtin-keyboard') return keyboardThumbSVG();
  return genericThumbSVG();
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let audioCtx = null;
function playClickSound(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1200, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.05);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.07);
  }catch(e){ /* audio unsupported, ignore */ }
}
document.addEventListener('click', (e)=>{
  if(e.target.closest('.catChip, .playBtn, .linkBtn')){
    playClickSound();
  }
}, true);

let activeCategory = '전체';
const catRow = document.getElementById('catRow');
function renderCatChips(){
  const cats = ['전체', ...CATEGORIES];
  catRow.innerHTML = cats.map(c=>`<button class="catChip ${c===activeCategory?'active':''}" data-cat="${c}">${c}</button>`).join('');
  catRow.querySelectorAll('.catChip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeCategory = btn.dataset.cat;
      renderCatChips();
      renderGrid();
    });
  });
}

const grid = document.getElementById('grid');
const countNum = document.getElementById('countNum');
const emptyState = document.getElementById('emptyState');
const searchInput = document.getElementById('searchInput');

function normalize(s){ return (s||'').toLowerCase().trim(); }

function renderGrid(){
  const q = normalize(searchInput.value);
  const games = getAllGames().filter(g=>{
    if(!g.published) return false;
    if(activeCategory==='전체' && g.hideInAll) return false;
    if(activeCategory!=='전체' && g.category!==activeCategory) return false;
    if(q && !normalize(g.name).includes(q)) return false;
    return true;
  });

  countNum.textContent = games.length;
  emptyState.style.display = games.length===0 ? 'block' : 'none';

  grid.innerHTML = games.map(g=>`
    <div class="gameCard">
      <div class="thumb">
        ${thumbInnerHTML(g)}
      </div>
      <div class="cardBody">
        <div class="gameTitle">${escapeHtml(g.name)}</div>
        <div class="gameTag">${escapeHtml(g.tag || g.category)}</div>
        <a class="playBtn" href="${escapeHtml(g.url)}" target="_blank" rel="noopener">▶ 플레이</a>
        <div class="linkRow">
          ${g.homeUrl ? `<a class="linkBtn" href="${escapeHtml(g.homeUrl)}" target="_blank" rel="noopener">🏠 홈페이지</a>` : ''}
          ${g.faqUrl ? `<a class="linkBtn" href="${escapeHtml(g.faqUrl)}" target="_blank" rel="noopener">❓ FAQ</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

searchInput.addEventListener('input', renderGrid);

renderCatChips();
renderGrid();
</script>

</body>
</html>
